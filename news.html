---
layout: default
---

<!-- ════════ NEWS HEADER ════════ -->
<section class="news-header">
  <div class="container">
    <p class="section-label">Development Log</p>
    <h1>Latest Updates</h1>
    <p>Stay up to date with the progress of the M1 Patient Mobile App.</p>
  </div>
</section>

<!-- ════════ NEWS LIST (AUTO-GENERATED) ════════ -->
<section class="news-section">
  <div class="container">
    <ul class="news-list">
      {% for post in site.posts %}
        <li class="news-item">
          <!-- Date -->
          <div class="news-date">{{ post.date | date: "%Y-%m-%d" }}</div>
          
          <!-- Content -->
          <div class="news-content">
            <h3><a href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a></h3>
            <!-- Excerpt -->
            <p class="news-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
          </div>
        </li>
      {% endfor %}
    </ul>
  </div>
</section>
