<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News - M1 Project</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .news-list { margin-top: 2rem; }
        .news-item { padding: 2rem; border-bottom: 1px solid #eee; margin-bottom: 1rem; border-radius: 8px; background: #fff; border: 1px solid #eee; transition: transform 0.2s; }
        .news-item:hover { transform: translateY(-2px); background: #fafafa; }
        .news-date { font-size: 0.85rem; color: #888; font-family: monospace; display: block; margin-bottom: 0.5rem; }
        .news-title { margin: 0 0 1rem 0; font-size: 1.5rem; }
        .news-title a { text-decoration: none; color: #333; }
        .news-title a:hover { color: #007bff; }
        .news-excerpt { line-height: 1.6; color: #666; margin: 0; }
        /* 加载中的提示样式 */
        #loading { text-align: center; color: #888; padding: 2rem; }
    </style>
</head>
<body>

  <!-- 导航栏 -->
  <nav>
    <div class="container nav-container">
      <a href="index.html" class="logo">M1 Project</a>
      <ul class="nav-links">
        <li><a href="index.html#mission">Mission</a></li>
        <li><a href="index.html#team">Team</a></li>
        <li><a href="index.html#workflow">Workflow</a></li>
        <li><a href="news.html">News</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主要内容 -->
  <main style="padding-top: 100px; padding-bottom: 50px;">
    <div class="container">
      <div class="reveal">
        <p class="section-label">Development Log</p>
        <h1 style="margin-bottom: 3rem;">Latest Updates</h1>
      </div>

      <!-- 新闻列表容器 -->
      <div class="news-list" id="news-container">
        <div id="loading">正在加载新闻...</div>
      </div>
    </div>
  </main>

  <!-- 页脚 -->
  <footer>
    <div class="container footer-container">
      <p>&copy; 2026 M1 Project Team.</p>
      <ul class="footer-links">
        <li><a href="index.html#mission">Mission</a></li>
        <li><a href="news.html">News</a></li>
      </ul>
    </div>
  </footer>

  <!-- JavaScript 脚本：自动读取 news-folder -->
  <script>
    // 配置：你的 GitHub 用户名和仓库名
    const USER = 'tnxmy'; // <--- 请修改这里
    const REPO = 'DSD2026_TeamM1';       // <--- 请修改这里
    const FOLDER = 'news-folder';    // 你的文件夹名

    async function loadNews() {
      const container = document.getElementById('news-container');
      
      try {
        // 1. 获取文件夹的文件列表
        const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${FOLDER}`);
        const files = await response.json();

        // 2. 过滤出 .md 文件并按日期排序（文件名格式必须是 2026-04-03-title.md）
        const mdFiles = files
          .filter(file => file.name.endsWith('.md'))
          .sort((a, b) => b.name.localeCompare(a.name)); // 倒序排列

        let html = '';

        // 3. 循环读取每个文件的内容
        for (const file of mdFiles) {
          const fileRes = await fetch(file.download_url);
          const text = await fileRes.text();
          
          // 简单解析 Markdown 头信息 (Front Matter)
          const titleMatch = text.match(/title:\s*(.*)/);
          const dateMatch = text.match(/date:\s*(.*)/);
          const title = titleMatch ? titleMatch[1] : file.name;
          const date = dateMatch ? dateMatch[1] : '';
          
          // 提取摘要（去掉头信息后的前 100 个字）
          const content = text.split('---')[2] || text;
          const excerpt = content.trim().substring(0, 100) + '...';

          // 生成 HTML
          html += `
            <article class="news-item reveal">
              <span class="news-date">${date}</span>
              <h2 class="news-title"><a href="${file.html_url}" target="_blank">${title}</a></h2>
              <p class="news-excerpt">${excerpt}</p>
            </article>
          `;
        }

        container.innerHTML = html;

      } catch (error) {
        console.error(error);
        container.innerHTML = '<p style="text-align:center; color:red;">加载新闻失败，请检查网络连接。</p>';
      }
    }

    // 页面加载完成后执行
    loadNews();
  </script>

</body>
</html>
